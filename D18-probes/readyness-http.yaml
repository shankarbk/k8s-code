apiVersion: v1
kind: Pod
metadata:
  name: ready-http
spec:
  containers:
  - name: nginx
    image: nginx
    readinessProbe:
      httpGet:
        path: /
        port: 80
        # port: 8090 # To fail the probe, uncomment the above line and comment this line then check the status of the pod using `kubectl describe pod ready-http`
      initialDelaySeconds: 5
      periodSeconds: 5