apiVersion: v1
kind: Pod
metadata:
  name: startup-tcp
spec:
  containers:
  - name: nginx
    image: nginx
    startupProbe:
      tcpSocket:
        port: 80
        # port: 8090 # To fail the probe, uncomment the above line and comment this line then check the status of the pod using `kubectl describe pod startup-tcp`
      failureThreshold: 30
      periodSeconds: 2