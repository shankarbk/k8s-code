apiVersion: v1
kind: Pod
metadata:
  name: dev-pod-inject-all
spec:
  containers:
  - name: my-dev-busybox-app
    image: busybox
    command:
      - sh
      - -c
      - |
        echo Container name is $CONTAINER_NAME
        echo Database host is $DATABASE_HOST
        echo Database host is $LOG_LEVEL
        sleep 3600
    envFrom:
    - configMapRef:
        name: dev-config