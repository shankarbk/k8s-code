# EX:1
apiVersion: v1
kind: Pod
metadata:
  name: test-pvc-pod
  namespace: default          # ← change if your PVC is in another namespace
spec:
  containers:
  - name: busybox
    image: busybox:1.36        # lightweight, good for quick tests
    command: ["/bin/sh", "-c", "sleep 3600"]   # just keep it running
    volumeMounts:
    - mountPath: /data         # ← where the volume appears inside the container
      name: persistent-storage
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: mysql-data    # ← must match your PVC name



