apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
spec:
  storageClassName: fast-local     # ← or just "local-path" if you didn't create custom one
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Mi               # works, but consider 1Gi+ for real MySQL testing