# volumeBindingMode: WaitForFirstConsumer      # Very important in 2024–2025 clusters
# allowVolumeExpansion: true                   # Can we grow PVC later?
# parameters:
#   type: pd-ssd-local                               # e.g. premium-ssd, standard-hdd, io1, gp3...
#   fsType: ext4
#   disk-type: pd-ssd
#   iopsPerGB: "10"
# mountOptions:
#   - discard


# Ex: for local storage class creation (e.g. for local testing with csi-hostpath-driver)

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: my-local-storage-sc           # ← your custom name
provisioner: rancher.io/local-path   # ← important: this is the provisioner name
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
# No parameters needed in most cases
# (you can add nodePathMap in ConfigMap if you want custom paths)

